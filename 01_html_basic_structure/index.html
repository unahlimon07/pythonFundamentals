<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- width=device-width is a meta viewport property that tells
      the browser to set the page width to the screen's width in 
      CSS pixels. It is critical for responsive design, preventing
       mobile browsers from using a default desktop width and 
       zooming out, ensuring content fits screens without 
       side-scrolling. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
</head>
<body>
    <h1>Hello, BSIT 1A</h1>
</body>
</html>
