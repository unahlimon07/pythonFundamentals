{% extends 'layout.html' %}

{% block title %}Random Number Generator{% endblock %}

{% block content %}
    <h1>Random Number Generator</h1>
    <p>Click the button to get a random number from the server.</p>
    <button id="getRandomBtn">Get Random Number</button>
    <h2>Your number is: <span id="randomNumberSpan">...</span></h2>

    
    
    <script>
        document.getElementById('getRandomBtn').addEventListener('click', function() {
            fetch("{{ url_for('generate_random') }}", {
                method: 'POST',
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('randomNumberSpan').textContent = data.number;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('randomNumberSpan').textContent = 'Error!';
            });
        });
    </script>

    
{% endblock %}
